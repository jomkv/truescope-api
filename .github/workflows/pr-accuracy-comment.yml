name: PR Accuracy Comment

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-accuracy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  evaluate-and-comment:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run accuracy evaluation
        id: accuracy_eval
        continue-on-error: true
        env:
          ENVIRONMENT: "production"
          PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          PROD_DB_NAME: ${{ secrets.PROD_DB_NAME }}
          PROD_DB_HOST: ${{ secrets.PROD_DB_HOST }}
          PROD_DB_PORT: ${{ secrets.PROD_DB_PORT }}
          SSL_MODE: ${{ secrets.SSL_MODE }}
          DB_CA_PATH: ${{ secrets.DB_CA_PATH }}
          ACCURACY_SAVE_FILES: "0"
          ACCURACY_QUIET: "1"
        shell: python
        run: |
          import asyncio
          import json
          import os

          from tests.test_100_claims.test_accuracy_parallel import main

          summary = asyncio.run(main())
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write("summary_json<<EOF\n")
              f.write(json.dumps(summary, ensure_ascii=False))
              f.write("\nEOF\n")

      - name: Comment accuracy on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-accuracy-comment -->';
            const summaryJson = `${{ steps.accuracy_eval.outputs.summary_json }}`;
            const evalStepOutcome = '${{ steps.accuracy_eval.outcome }}';
            const evalStepConclusion = '${{ steps.accuracy_eval.conclusion }}';

            const pct = (v) => (typeof v === 'number' ? `${(v * 100).toFixed(2)}%` : 'n/a');

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body;

            if (summaryJson) {
              try {
                const summary = JSON.parse(summaryJson);
                const datasets = summary.datasets || {};
                const normal = datasets.jomTestCases;
                const negated = datasets.negatedClaims;

                body = `${marker}
                ## Accuracy Check Results

                - Normal dataset (jomTestCases): **${pct(normal?.accuracy)}** (${normal?.correct ?? 'n/a'}/${normal?.total ?? 'n/a'})
                - Negated dataset (negatedClaims): **${pct(negated?.accuracy)}** (${negated?.correct ?? 'n/a'}/${negated?.total ?? 'n/a'})

                - Evaluation step outcome: ${evalStepOutcome}/${evalStepConclusion}
                - Run: ${runUrl}`;
              } catch (error) {
                body = `${marker}
                ## Accuracy Check Results

                Accuracy evaluation produced summary output, but parsing failed.

                - Evaluation step outcome: ${evalStepOutcome}/${evalStepConclusion}
                - Run: ${runUrl}`;
              }
            } else {
              body = `${marker}
              ## Accuracy Check Results

              Accuracy evaluation did not produce summary JSON in step output.

              - Evaluation step outcome: ${evalStepOutcome}/${evalStepConclusion}
              - Run: ${runUrl}`;
            }

            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
